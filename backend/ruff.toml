exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

line-length = 120
indent-width = 4
target-version = "py313"
extend-include = ["*.ipynb"]


[lint]
select = ["ALL"]
extend-select = ["I"]
ignore = ["D203", "D213"]

[lint.per-file-ignores]
# Tests use bare asserts and don't need docstrings or a package marker.
"tests/**" = ["S101", "D", "INP001", "PLR2004", "ANN"]
# The demo-data generator uses non-cryptographic randomness on purpose.
"scripts/generate_mock_data.py" = ["S311"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"
